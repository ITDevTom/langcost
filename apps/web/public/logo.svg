<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    LangCost logo — Trace/Span concept (horizontal)
    3 input nodes → converging arrow → orange output node → 2 output branches
  -->

  <!-- Left input trace lines -->
  <line x1="6" y1="12" x2="20" y2="22" stroke="#2a2f3d" stroke-width="3" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="20" y2="30" stroke="#2a2f3d" stroke-width="3" stroke-linecap="round"/>
  <line x1="6" y1="52" x2="20" y2="42" stroke="#2a2f3d" stroke-width="3" stroke-linecap="round"/>

  <!-- Left input nodes (3 data sources) -->
  <circle cx="6" cy="12" r="3.5" fill="#2a2f3d"/>
  <circle cx="6" cy="32" r="3.5" fill="#2a2f3d"/>
  <circle cx="6" cy="52" r="3.5" fill="#2a2f3d"/>

  <!-- Inner dots on input nodes -->
  <circle cx="6" cy="12" r="1.5" fill="#8a92a2"/>
  <circle cx="6" cy="32" r="1.5" fill="#8a92a2"/>
  <circle cx="6" cy="52" r="1.5" fill="#8a92a2"/>

  <!-- Convergence junction nodes -->
  <circle cx="20" cy="22" r="3.8" fill="#2a2f3d"/>
  <circle cx="20" cy="30" r="2.8" fill="#2a2f3d"/>
  <circle cx="20" cy="42" r="3.8" fill="#2a2f3d"/>

  <!-- Central converging arrow shape (the pipeline) -->
  <path d="M20 18 L38 30 L38 34 L20 46 Z" fill="#3a4050" opacity="0.3"/>
  <path d="M22 20 L38 30 L38 34 L22 44 Z" fill="#2a2f3d" opacity="0.15"/>
  <path d="M20 20 L36 31 L36 33 L20 44" stroke="#2a2f3d" stroke-width="2.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Arrow stem to orange node -->
  <line x1="36" y1="32" x2="44" y2="32" stroke="#2a2f3d" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Orange output node (the insight/cost point) -->
  <circle cx="47" cy="32" r="6" fill="#ff6b00"/>
  <circle cx="47" cy="32" r="2.8" fill="#ffffff"/>

  <!-- Output branches from orange node -->
  <line x1="50" y1="28.5" x2="58" y2="22" stroke="#ff6b00" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="50" y1="35.5" x2="58" y2="42" stroke="#ff6b00" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Output endpoint nodes -->
  <circle cx="58" cy="22" r="2.8" fill="#ff6b00"/>
  <circle cx="58" cy="42" r="2.8" fill="#ff6b00"/>
  <circle cx="58" cy="22" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="58" cy="42" r="1.2" fill="#ffffff" opacity="0.7"/>
</svg>
