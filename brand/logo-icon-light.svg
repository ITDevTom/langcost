<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    LangCost logo — white version for dark backgrounds
    Orange head at top, white body/sources below.
  -->

  <!-- Orange head node -->
  <circle cx="32" cy="8" r="6.5" fill="#ff6b00"/>
  <circle cx="32" cy="8" r="3" fill="#ffffff"/>

  <!-- Antennae -->
  <line x1="27" y1="4.5" x2="21" y2="1" stroke="#ff6b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="4.5" x2="43" y2="1" stroke="#ff6b00" stroke-width="2" stroke-linecap="round"/>
  <circle cx="21" cy="1" r="2" fill="#ff6b00"/>
  <circle cx="43" cy="1" r="2" fill="#ff6b00"/>
  <circle cx="21" cy="1" r="0.9" fill="#ffffff" opacity="0.7"/>
  <circle cx="43" cy="1" r="0.9" fill="#ffffff" opacity="0.7"/>

  <!-- Neck -->
  <line x1="32" y1="14.5" x2="32" y2="22" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>

  <!-- V body -->
  <path d="M18 44 L31 24 L33 24 L46 44" stroke="#ffffff" stroke-width="2.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M20 42 L32 24 L44 42 Z" fill="#ffffff" opacity="0.1"/>

  <!-- Junction nodes -->
  <circle cx="22" cy="38" r="3.8" fill="#ffffff"/>
  <circle cx="32" cy="28" r="2.8" fill="#ffffff"/>
  <circle cx="42" cy="38" r="3.8" fill="#ffffff"/>

  <!-- Source lines -->
  <line x1="10" y1="58" x2="22" y2="42" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="32" y2="44" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="54" y1="58" x2="42" y2="42" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Source nodes -->
  <circle cx="10" cy="58" r="3.5" fill="#ffffff"/>
  <circle cx="32" cy="58" r="3.5" fill="#ffffff"/>
  <circle cx="54" cy="58" r="3.5" fill="#ffffff"/>
  <circle cx="10" cy="58" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="32" cy="58" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="54" cy="58" r="1.5" fill="#ffffff" opacity="0.5"/>
</svg>
